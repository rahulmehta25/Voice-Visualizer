<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Visualizer | Immersive Sound Portrait Studio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="visualizer"></canvas>

    <div class="overlay">
        <header class="topbar glass">
            <div class="brand">
                <span class="brand-dot"></span>
                <h1>Voice <span>Visualizer</span></h1>
            </div>
            <div class="top-right">
                <div class="level-meter">
                    <div class="level-bar" id="levelBar"></div>
                </div>
                <button class="beat-indicator" id="beatIndicator" aria-label="Beat Indicator">
                    <span class="beat-core"></span>
                    <span class="beat-ring"></span>
                </button>
            </div>
        </header>

        <nav class="mode-selector glass" aria-label="Visualization Mode">
            <button class="mode-btn active" data-mode="waveform">
                <span class="mode-icon">〰️</span>
                <span>Waveform</span>
            </button>
            <button class="mode-btn" data-mode="radial">
                <span class="mode-icon">⭕</span>
                <span>Radial</span>
            </button>
            <button class="mode-btn" data-mode="cloud">
                <span class="mode-icon">🧊</span>
                <span>3D Cloud</span>
            </button>
            <button class="mode-btn" data-mode="aurora">
                <span class="mode-icon">🌌</span>
                <span>Northern Lights</span>
            </button>
        </nav>

        <section class="hud glass">
            <div class="hud-stat">
                <span class="label">Pitch</span>
                <span class="value" id="pitchValue">--</span>
            </div>
            <div class="hud-stat">
                <span class="label">Volume</span>
                <span class="value" id="volumeValue">0%</span>
            </div>
            <div class="hud-stat">
                <span class="label">BPM</span>
                <span class="value" id="bpmValue">--</span>
            </div>
            <div class="hud-stat">
                <span class="label">Mode</span>
                <span class="value" id="modeValue">Waveform</span>
            </div>
        </section>

        <div class="controls">
            <button class="primary-btn" id="startBtn">
                <span class="icon">🎤</span>
                <span class="text">Start Mic</span>
            </button>
            <button class="secondary-btn" id="recordBtn">
                <span class="icon">⏺</span>
                <span class="text">Record Clip + Portrait</span>
            </button>
            <button class="secondary-btn" id="screenshotBtn">
                <span class="icon">📷</span>
                <span class="text">Snapshot</span>
            </button>
        </div>

        <div class="recording-strip glass hidden" id="recordingIndicator">
            <span class="rec-dot"></span>
            <span>REC</span>
            <span id="recTime">00:00</span>
        </div>

        <div class="frequency-mini glass" id="freqBars"></div>
    </div>

    <aside class="portrait-panel hidden" id="portraitPanel" aria-live="polite">
        <div class="portrait-card">
            <h2>Sound Portrait Ready</h2>
            <p>Your clip was captured. Share this generated image.</p>
            <img id="portraitPreview" alt="Generated sound portrait">
            <div class="portrait-actions">
                <a id="portraitDownload" class="portrait-btn" download>Download</a>
                <button id="portraitShare" class="portrait-btn">Share</button>
                <button id="portraitClose" class="portrait-btn ghost">Close</button>
            </div>
        </div>
    </aside>

    <div class="toast-container" id="toastContainer"></div>

    <script src="audio.js"></script>
    <script src="visuals.js"></script>
    <script src="recorder.js"></script>
    <script src="app.js"></script>
</body>
</html>
